[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:xvfb]
command=Xvfb :1 -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx%(ENV_SCREEN_DEPTH)s -ac +extension GLX +render -noreset
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb_err.log
stopasgroup=true
killasgroup=true

[program:openbox]
command=/bin/bash -c "sleep 2 && DISPLAY=:1 openbox-session"
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/openbox.log
stderr_logfile=/var/log/supervisor/openbox_err.log
stopasgroup=true
killasgroup=true

[program:x11vnc]
command=/bin/bash -c "sleep 3 && x11vnc -display :1 -nopw -listen 0.0.0.0 -xkb -ncache 10 -ncache_cr -forever -shared -rfbport 5900"
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc_err.log
stopasgroup=true
killasgroup=true

[program:novnc]
command=/bin/bash -c "sleep 4 && websockify --web /opt/novnc 6080 localhost:5900"
autorestart=true
priority=40
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc_err.log
stopasgroup=true
killasgroup=true

[program:chromium]
command=/bin/bash -c "sleep 5 && DISPLAY=:1 chromium-browser --no-sandbox --disable-dev-shm-usage --disable-gpu --start-maximized --new-window 'https://www.google.com'"
autorestart=false
priority=50
stdout_logfile=/var/log/supervisor/chromium.log
stderr_logfile=/var/log/supervisor/chromium_err.log
stopasgroup=true
killasgroup=true