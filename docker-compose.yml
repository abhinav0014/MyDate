version: '3.8'

# BrowserVM Rooms — Multi-user shared browser rooms
# Each room spawns its own container on demand via the Node.js server.
#
# Ports:
#   3000 → Room server (UI + Socket.io + WS proxy)
#
# The room-server container manages sibling containers via Docker socket.

services:

  # ── Room Server (Node.js) ─────────────────────────────────────────────────
  room-server:
    build:
      context: ./server
      dockerfile: Dockerfile.server
    container_name: browservm-room-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      # Mount Docker socket so the server can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Serve the client from a mounted volume
      - ./client/public:/app/client/public:ro
    networks:
      - browservm-net

networks:
  browservm-net:
    driver: bridge
